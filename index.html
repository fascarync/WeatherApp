<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Forecast</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
		    background-color: rgba(255, 255, 255, 0.25);
    }
    #map {
        height: 350px;
        width: 100%;
		display: none;
    }
    #forecast {
        padding: 20px;
		display: flex;
        flex-wrap: wrap;
        gap: 15px;
        background: #f7f7f7;
    }
    .forecast-day {
        background: #fff;
        padding: 10px;
        width: 48%;
        border-radius: 6px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        text-align: center;
    }
    .forecast-day img {
        max-width: 80px;
    }

	.weather-bar {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 10px 16px;
      width: 100%;
      background: #f5f5f5;
      color: #333;
      font-size: 16px;
	  border-bottom: 2px dotted black;
    }
	
	.wb-item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .wb-temp {
      font-weight: 600;
      font-size: 18px;
    }
	
	.wb-icon {
      font-size: 18px;
    }

    .wb-divider {
      width: 1px;
      height: 20px;
      background: #ddd;
    }

    .wb-plus {
      font-size: 20px;
      font-weight: 500;
      cursor: pointer;
    }
	
   .hour-icon {
     width: 20px;
     height: 20px;
     object-fit: contain;
   }
</style>
</head>
<body>

<h2 id="banner" style="text-align:center;">Local Weather Forecast</h2>
<div id="map"></div>
<div id="forecast"></div>

<script>
let map;
let marker;
let infoWindow;
let latitude=0;
let longitude=0;
let hourlyForecastURL = "";
let dailySummaries = [];

async function initApp() {

	try {
   

		
		await getIpLocation();
		
		// Initialize Google Map
        initMap(latitude, longitude);
		
		try {
		        // Step 1: Get grid point info from NWS
                const pointResp = await fetch(`https://api.weather.gov/points/${latitude},${longitude}`);
                const pointData = await pointResp.json();
                const forecastUrl = pointData.properties.forecast;
				hourlyForecastURL = pointData.properties.forecastHourly;

                // Step 2: Get forecast
                const forecastResp = await fetch(forecastUrl);
                const forecastData = await forecastResp.json();

                // Take only first 14 periods (7 days: day/night pairs)
                const periods = forecastData.properties.periods;
				
				// const dailySummaries = [];
                for (let i = 0; i < periods.length; i += 2) {
                    if (periods[i+1]) { // has both day & night
                        dailySummaries.push({
                            dayName: periods[i].name,
                            dayIcon: periods[i].icon,
                            dayTemp: `${periods[i].temperature}°${periods[i].temperatureUnit}`,
                            dayShort: periods[i].shortForecast,
                            dayDetail: periods[i].detailedForecast,
                            nightName: periods[i+1].name,
                            nightIcon: periods[i+1].icon,
                            nightTemp: `${periods[i+1].temperature}°${periods[i+1].temperatureUnit}`,
                            nightShort: periods[i+1].shortForecast,
                            nightDetail: periods[i+1].detailedForecast
                        });
                    }
                }

                displayForecast(dailySummaries, latitude, longitude);
		} catch (error) {
			document.getElementById("forecast").innerText = "Error intializing application: " + error;
		}

	} catch (error) {
		document.getElementById("forecast").innerText = "InitApp Error";
	}
}

function restoreDefaultView() {
	const banner = document.getElementById("banner");
    banner.innerHTML = "Local Weather Forecast";
    displayForecast(dailySummaries, latitude, longitude);
}


async function getIpLocation() {
      const apiKey = "b1e3df1df2354b0ca4819cd31d4222d2"; // Replace with your real API key
      const url = `https://api.ipgeolocation.io/v2/ipgeo?apiKey=${apiKey}`;

      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error("HTTP error " + response.status);
        }
        const data = await response.json();

        latitude = data.location.latitude;
        longitude = data.location.longitude;
      } catch (error) {
        document.getElementById("forecast").innerHTML =
          "Error fetching location: " + error.message;
      }
    }

function initMap(lat, lon) {
    let center = new google.maps.LatLng(lat, lon);
    map = new google.maps.Map(document.getElementById("map"), {
        center: center,
        zoom: 10,
		mapId: "WEATHER_MAP_ID"
    });
	
	let fLat = parseFloat(lat);
	let fLon = parseFloat(lon);
	
    marker = new google.maps.marker.AdvancedMarkerElement({
        map,
        position: { lat: fLat, lng: fLon },
		gmpClickable: true,
		gmpDraggable: false,
    });
	
	infoWindow = new google.maps.InfoWindow();
}

async function displayHourlyForcast(index) {
	console.log("displayHourlyForcast, index: " + index);
	const date = new Date();
	const hour = date.getHours();
	console.log("   date: " + date.toLocaleString());
	console.log("   hour: " + hour);
	console.log("hourlyForecastURL: " + hourlyForecastURL);
	
	// Get forecast
    const forecastResp = await fetch(hourlyForecastURL);
    const forecastData = await forecastResp.json();
	const periods = forecastData.properties.periods;
	console.log(dailySummaries[0].dayName);
	
	let dayName = (index == 0) ? ((periods[0].isDaytime) ? dailySummaries[index].dayName : dailySummaries[index].nightName) : dailySummaries[index].dayName;
	const bannerStr = "Hourly Forecast for " + dayName;
	const banner = document.getElementById("banner");
    banner.innerHTML = `${bannerStr}`;
	
	const forecastEl = document.getElementById("forecast");
    forecastEl.innerHTML = "";
	
	// now we need to find the start place in our samples, if they chose today, then it is zero and we do only samples for rest of the day
	// if index is not zero then we need to figure out the starting point and do 24 samples (or until we run out).
	let startIdx = 0;
	let endIdx = 23;
	

	// step 1, how many samples are left in today.
	let n = 24 - Number((`${periods[0].startTime}`.split("T")[1].split("-")[0]).split(":")[0]);
	console.log("n is: " + n);
	   
	if (index != 0) {
	   startIdx = n + ((index - 1) * 24);
	   endIdx = startIdx + 23;
	   if (endIdx >= periods.length)
	     endIdx = periods.length;
    }		 
	else {
	   // only show the remaining hours for today
	   endIdx = n - 1;
	}

	
	console.log(startIdx);
	console.log(endIdx);

    // display 24 periods
    for (let i = startIdx; i <= endIdx; i++) {
	   console.log(periods[i]);
	   const temp = `${periods[i].temperature}°${periods[i].temperatureUnit}`;
	   const hrStr = (`${periods[i].startTime}`.split("T")[1].split("-")[0]).split(":")[0];
	   //const hrStr = timeStr.split(":")[0];
	   let hr = Number(hrStr);
	   let displayHour = (hr > 12 ? (hr-12) : ((hr > 0) ? hr : 12))  + (hr > 11 ? " PM" : " AM")
	   console.log(hrStr);
	   console.log(displayHour);
	   const div = document.createElement("div");
	   
       div.className = "weather-bar";
       div.innerHTML = `
	              <div class = "wb-item">${displayHour}</div>
	              <div class = "wb-item"> <img width="30" height="30" src="${periods[i].icon}" alt="${periods[i].icon} class="hour-icon" </div>
				  <div class = "wb-item">${periods[i].shortForecast}</div>
				  <div class = "wb-item wb-temp"> ${temp} </div>
				  <div class = "wb-item">Wind ${periods[i].windSpeed} ${periods[i].windDirection}</div>
				  <div class = "wb-item">Chance of Precipitation ${periods[i].probabilityOfPrecipitation.value}%</div>
	           `;
	   forecastEl.appendChild(div);
	   div.addEventListener('click', restoreDefaultView);
	   /*
                        dailySummaries.push({
                            dayName: periods[i].name,
                            dayIcon: periods[i].icon,
                            dayTemp: `${periods[i].temperature}°${periods[i].temperatureUnit}`,
                            dayShort: periods[i].shortForecast,
                            dayDetail: periods[i].detailedForecast,
                            nightName: periods[i+1].name,
                            nightIcon: periods[i+1].icon,
                            nightTemp: `${periods[i+1].temperature}°${periods[i+1].temperatureUnit}`,
                            nightShort: periods[i+1].shortForecast,
                            nightDetail: periods[i+1].detailedForecast
                        });
                }
		*/
	}  // for
}


function displayForecast(dailySummaries, lat, lon) {
    const forecastEl = document.getElementById("forecast");
    forecastEl.innerHTML = "";

    dailySummaries.forEach((day, index) => {
        // Create forecast card
        const div = document.createElement("div");
        div.className = "forecast-day";
        div.innerHTML = `
            <strong>${day.dayName}</strong><br>
            <img src="${day.dayIcon}" alt="${day.dayShort}"><br>
            ${day.dayTemp}<br>
            <small>${day.dayDetail}</small><br><br>
            <strong>${day.nightName}</strong><br>
            <img src="${day.nightIcon}" alt="${day.nightShort}"><br>
            ${day.nightTemp}<br>
            <small>${day.nightDetail}</small>
        `;
        forecastEl.appendChild(div);


		// Create custom icon marker
	    let fLat = parseFloat(lat);
	    let fLon = parseFloat(lon);
		let center = new google.maps.LatLng(fLat, fLon + index * 0.002);
		const marker = new google.maps.marker.AdvancedMarkerElement({
			map,
			position: center,
			title: `${day.dayName} - ${day.dayShort}`,

		});

		div.addEventListener('click', () => displayHourlyForcast(index));
		// div.addEventListener('click', function() {
		//console.log("In Listener day is: ");
		//    displayHourlyForcast(index); 
        //    infoWindow.setContent(`
        //        <div style="max-width:220px">
        //            <strong>${day.dayName}</strong><br>
        //            <img src="${day.dayIcon}" alt="${day.dayShort}" style="max-width:50px"><br>
        //            ${day.dayTemp} - ${day.dayShort}<br><br>
        //            <strong>${day.nightName}</strong><br>
        //            <img src="${day.nightIcon}" alt="${day.nightShort}" style="max-width:50px"><br>
        //            ${day.nightTemp} - ${day.nightShort}<br><br>
        //            <em>${day.dayDetail}</em><br><br>
        //            <em>${day.nightDetail}</em>
         //       </div>
         //   `);
        //    infoWindow.open(map, marker);
        //});

    });
}

window.initApp = initApp;
</script>

<!-- Replace YOUR_GOOGLE_MAPS_API_KEY with your actual key -->
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDJMh2yq_dkOpJnb_EbhEw1wDfjlkbKMLs&callback=initApp&libraries=marker"></script>

</body>
</html>
